name: Release

# Build ONE plugin and attach it to a per-plugin GitHub Release.
#
# Triggered by pushing a per-plugin tag `<slug>-v<version>` (e.g.
# `saturator-v0.1.2`). Only that plugin is built — on macOS and Windows — and
# packaged per OS:
#   - macOS:   VST3 + AU  -> <slug>-v<version>-macOS.zip
#   - Windows: VST3       -> <slug>-v<version>-Windows.zip
#
# The tag version must match the plugin's plugin.toml version (single source of
# truth: catalog == binary == release); a mismatch fails the run.
#
# The build setup mirrors ci.yml (Ninja + compiler cache). `workflow_dispatch`
# builds the plugin named by the `slug` input; by default it only produces
# downloadable artifacts, but checking `publish` also creates the Release and
# tag `<slug>-v<version>` (version taken from plugin.toml) — a tagless way to
# ship from the Actions UI.

on:
  push:
    tags: [ '*-v*' ]
  workflow_dispatch:
    inputs:
      slug:
        description: "Plugin slug to build (e.g. saturator)"
        required: true
        type: string
      publish:
        description: "Create a GitHub Release (tag <slug>-v<version>) and attach the built artifacts"
        required: false
        default: false
        type: boolean

# Scope concurrency per plugin so releasing two plugins at once (both dispatched
# from `main`) don't share a group and cancel each other. On a tag push
# `github.ref_name` is the unique tag; on a manual run it's the `slug` input.
concurrency:
  group: release-${{ github.event.inputs.slug || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: macOS,   os: macos-latest,   ccache: ccache }
          - { name: Windows, os: windows-latest, ccache: sccache }

    steps:
      - uses: actions/checkout@v4

      # Resolve which plugin to build from the tag `<slug>-v<version>` (or the
      # `slug` input on workflow_dispatch), find its CMake target, and verify
      # the tag version matches plugin.toml. Runs under bash on every OS (the
      # Windows runner has Git bash).
      - name: Resolve plugin
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag="${{ github.ref_name }}"
            slug="${tag%-v*}"        # strip trailing -v<version>
            version="${tag##*-v}"    # keep the <version>
          else
            slug="${{ github.event.inputs.slug }}"
            version=""               # filled from plugin.toml below
          fi

          dir="plugins/$slug"
          if [[ ! -f "$dir/plugin.toml" ]]; then
            echo "::error::Unknown plugin slug '$slug' (no $dir/plugin.toml)"
            exit 1
          fi

          target=$(grep -oE 'juce_add_plugin\(\s*[A-Za-z0-9_]+' "$dir/CMakeLists.txt" \
                   | head -1 | sed -E 's/juce_add_plugin\(\s*//')
          if [[ -z "$target" ]]; then
            echo "::error::Could not find juce_add_plugin target in $dir/CMakeLists.txt"
            exit 1
          fi

          manifest_version=$(grep -oE 'version[[:space:]]*=[[:space:]]*"[0-9]+\.[0-9]+\.[0-9]+"' \
                             "$dir/plugin.toml" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [[ -n "$version" && "$version" != "$manifest_version" ]]; then
            echo "::error::Tag version $version != plugin.toml version $manifest_version for $slug"
            exit 1
          fi
          version="$manifest_version"

          {
            echo "slug=$slug"
            echo "version=$version"
            echo "target=$target"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: slug=$slug target=$target version=$version"

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Set up MSVC + Ninja (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Compiler cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: release-${{ matrix.os }}
          variant: ${{ matrix.ccache }}
          max-size: 1500M

      - name: Configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER_LAUNCHER=${{ matrix.ccache }}
          -DCMAKE_CXX_COMPILER_LAUNCHER=${{ matrix.ccache }}

      # Build only the target plugin's shippable formats (VST3 everywhere, AU on
      # macOS) — not the whole factory.
      - name: Build
        shell: bash
        run: |
          targets="${{ steps.meta.outputs.target }}_VST3"
          if [ "$RUNNER_OS" = "macOS" ]; then
            targets="$targets ${{ steps.meta.outputs.target }}_AU"
          fi
          cmake --build build --target $targets

      # ---- package -----------------------------------------------------------
      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          stage="${{ steps.meta.outputs.slug }}-v${{ steps.meta.outputs.version }}-macOS"
          mkdir -p dist "$stage"
          while IFS= read -r p; do
            cp -R "$p" "$stage/"
          done < <(find "build/plugins/${{ steps.meta.outputs.slug }}" \
                     \( -type d -path '*/VST3/*.vst3' -o -type d -path '*/AU/*.component' \))
          ( cd "$stage" && zip -r "../dist/${stage}.zip" . )
          ls -la dist

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "${{ steps.meta.outputs.slug }}-v${{ steps.meta.outputs.version }}-Windows"
          New-Item -ItemType Directory -Force dist, $stage | Out-Null
          Get-ChildItem "build/plugins/${{ steps.meta.outputs.slug }}" -Recurse -Directory -Filter *.vst3 |
            Where-Object { $_.FullName -match '[\\/]VST3[\\/]' } |
            ForEach-Object { Copy-Item -Recurse $_.FullName $stage }
          Compress-Archive -Path "$stage/*" -DestinationPath "dist/$stage.zip" -Force
          Get-ChildItem dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.name }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Publish Release
    # Publish on a tag push, or on a manual run with `publish` checked (which
    # creates the tag from the plugin's manifest version).
    if: >
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write        # required to create the Release and upload assets
    steps:
      # Full history + tags so the changelog can diff against this plugin's
      # previous release tag.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # The tag is the same either way: on a tag push it's github.ref_name; on a
      # manual publish it's derived from the artifact name `<slug>-v<version>-<os>.zip`
      # (the build job already verified it against plugin.toml). Deriving it here
      # keeps a single source and lets action-gh-release create the tag on dispatch.
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          f=$(basename "$(ls dist/*.zip | head -1)")
          tag="${f%-macOS.zip}"
          tag="${tag%-Windows.zip}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "slug=${tag%-v*}" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      # Build per-plugin release notes. GitHub's generate_release_notes lists
      # every PR since the previous tag repo-wide, which mixes in other plugins'
      # changes. Instead, diff this plugin's previous <slug>-v* tag to HEAD and
      # keep only commits that touched this plugin's directory. (Filtering on
      # core/ui too would pull in unrelated plugins, since each plugin-add commit
      # also drops its own primitive into core/. A core change that warrants a
      # release bumps this plugin's plugin.toml, so it still lands in the log.)
      - name: Build changelog
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          slug="${{ steps.tag.outputs.slug }}"
          prev=$(git tag --list "${slug}-v*" --sort=-v:refname | grep -vFx "$tag" | head -1)
          if [ -n "$prev" ]; then range="$prev..HEAD"; else range="HEAD"; fi
          echo "Changelog range: ${prev:-<start>}..HEAD (path: plugins/$slug)"

          # Group commits into Features / Fixes / Other. Conventional-commit
          # prefixes are authoritative: `feat:` -> 機能, `fix:` -> 修正, any other
          # type (docs/refactor/chore/ci/…) -> その他, and the `type(scope)!:`
          # prefix is stripped from the displayed text. Commits without a prefix
          # fall back to a keyword heuristic (Add/introduce -> feature, fix/bug ->
          # fix). Order within a group stays newest-first, as `git log` returns it.
          git log $range --no-merges --pretty='%s|%h' -- "plugins/${slug}/" > commits.txt || true
          feats=""; fixes=""; others=""
          while IFS='|' read -r subj hash; do
            [ -z "$subj" ] && continue
            lc=$(printf '%s' "$subj" | tr '[:upper:]' '[:lower:]')
            type=$(printf '%s' "$lc" | sed -nE 's/^([a-z]+)(\([^)]*\))?!?:.*/\1/p')
            display="$subj"
            case "$type" in
              feat|fix|docs|refactor|perf|test|chore|ci|build|style|revert)
                display=$(printf '%s' "$subj" | sed -E 's/^[a-zA-Z]+(\([^)]*\))?!?:[[:space:]]*//') ;;
              *) type="" ;;
            esac
            line="- ${display} (${hash})"
            if   [ "$type" = "fix" ];  then fixes+="${line}"$'\n'
            elif [ "$type" = "feat" ]; then feats+="${line}"$'\n'
            elif [ -n "$type" ];       then others+="${line}"$'\n'
            else
              case "$lc" in
                *fix*|*bug*|*regression*|*hotfix*|*correct*) fixes+="${line}"$'\n' ;;
                add\ *|*introduce*)                          feats+="${line}"$'\n' ;;
                *)                                           others+="${line}"$'\n' ;;
              esac
            fi
          done < commits.txt

          {
            echo "## ${slug} の変更点"
            [ -n "$prev" ] && echo "_${prev} からの変更_" || echo "_初回リリース_"
            echo
            if [ -z "${feats}${fixes}${others}" ]; then
              echo "- 前回リリース以降、このプラグイン固有の変更はありません。"
            else
              [ -n "$feats" ]  && { echo "### 機能";   echo; printf '%s' "$feats";  echo; }
              [ -n "$fixes" ]  && { echo "### 修正";   echo; printf '%s' "$fixes";  echo; }
              [ -n "$others" ] && { echo "### その他"; echo; printf '%s' "$others"; echo; }
            fi
          } > notes.md
          echo "----- notes.md -----"; cat notes.md

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: dist/*.zip
          draft: false
          body_path: notes.md
