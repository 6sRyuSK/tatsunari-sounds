name: Release

# Single consolidated release for the whole plugin factory.
#
# One GitHub Release per run (tag `<year>.<n>` — the n-th release of that year,
# e.g. 2026.1, 2026.2). Manually triggered from the Actions UI; no per-plugin
# tags, so the Releases page stays a single clean timeline.
#
# What a run does:
#   1. plan    — read every plugins/<slug>/plugin.toml version, compare against
#                the previous release's manifest.json, and build the list of
#                plugins whose version changed (single source of truth: plugin.toml).
#   2. build   — compile ONLY the changed plugins and zip each ON ITS NATIVE OS
#                (so bundle structure + permissions survive). macOS ships AU and
#                VST3 as SEPARATE per-plugin zips; Windows ships VST3. Unchanged
#                plugins are not rebuilt.
#   3. package — per OS, on the native runner: gather each plugin's zips (rebuilt
#                this run, or carried verbatim from the previous release) and
#                assemble the per-OS "everything" bundles — macOS-AU, macOS-VST3,
#                Windows — FLATTENED so a user can unzip and drop the contents
#                straight into one plugin folder. A macOS bundle is only ever
#                unzipped/rezipped on macOS, never round-tripped through Linux.
#   4. release — publish one Release with every asset plus manifest.json (slug ->
#                version, drives the next run) and per-changed-plugin notes.
#
# The tag version comes from the release count, not from any single plugin, so
# the bundle has its own product-style version independent of per-plugin semver.
# Version tokens in asset filenames use `v<major>_<minor>_<patch>` (and the tag
# as `v<year>_<n>`) so the dots never collide with the `-` field separator.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # --------------------------------------------------------------------------
  # Decide the tag and which plugins changed since the previous release.
  # --------------------------------------------------------------------------
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      tag: ${{ steps.plan.outputs.tag }}
      prev_tag: ${{ steps.plan.outputs.prev_tag }}
      changed: ${{ steps.plan.outputs.changed }}
      include: ${{ steps.plan.outputs.include }}
      any_changed: ${{ steps.plan.outputs.any_changed }}
      plugins: ${{ steps.plan.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag, plugins and changed set
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          # --- enumerate plugins: slug, version, display name, CMake target ---
          plugins='[]'
          for dir in plugins/*/; do
            slug=$(basename "$dir")
            [ -f "${dir}plugin.toml" ] || continue
            version=$(grep -oE 'version[[:space:]]*=[[:space:]]*"[0-9]+\.[0-9]+\.[0-9]+"' "${dir}plugin.toml" \
                      | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            name=$(grep -oE 'name[[:space:]]*=[[:space:]]*"[^"]+"' "${dir}plugin.toml" \
                   | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            target=$(grep -oE 'juce_add_plugin\(\s*[A-Za-z0-9_]+' "${dir}CMakeLists.txt" \
                     | head -1 | sed -E 's/juce_add_plugin\(\s*//')
            if [ -z "$version" ] || [ -z "$target" ]; then
              echo "::error::Could not resolve version/target for $slug"; exit 1
            fi
            plugins=$(jq -c --arg s "$slug" --arg v "$version" --arg n "$name" --arg t "$target" \
                      '. + [{slug:$s, version:$v, name:$n, target:$t}]' <<<"$plugins")
          done
          echo "Plugins: $plugins"

          # --- find previous unified release (tag `<year>.<n>`) and its versions ---
          year=$(date +%Y)
          all_tags=$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate --jq '.[].tag_name' 2>/dev/null || true)
          unified=$(printf '%s\n' "$all_tags" | grep -E '^[0-9]{4}\.[0-9]+$' || true)
          prev_tag=$(printf '%s\n' "$unified" | grep -E '.' | sort -t. -k1,1n -k2,2n | tail -1 || true)
          maxN=$(printf '%s\n' "$unified" | awk -F. -v y="$year" '$1==y{print $2}' | sort -n | tail -1)
          if [ -z "${maxN:-}" ]; then N=1; else N=$((maxN + 1)); fi
          tag="${year}.${N}"
          echo "prev_tag=${prev_tag:-<none>}  new tag=$tag"

          # previous manifest (slug -> version) drives change detection
          rm -rf prevrel; mkdir -p prevrel
          prev_manifest=""
          if [ -n "${prev_tag:-}" ]; then
            if gh release download "$prev_tag" -p manifest.json -D prevrel 2>/dev/null; then
              prev_manifest="prevrel/manifest.json"
            fi
          fi

          # --- changed set + build matrix (changed plugins x OS) ---
          changed='[]'
          include='[]'
          while read -r row; do
            slug=$(jq -r .slug <<<"$row")
            ver=$(jq -r .version <<<"$row")
            target=$(jq -r .target <<<"$row")
            pv=""
            if [ -n "$prev_manifest" ]; then
              pv=$(jq -r --arg s "$slug" '.[$s] // ""' "$prev_manifest")
            fi
            if [ "$pv" != "$ver" ]; then
              changed=$(jq -c --arg s "$slug" '. + [$s]' <<<"$changed")
              for os in macOS Windows; do
                include=$(jq -c --arg s "$slug" --arg t "$target" --arg v "$ver" --arg o "$os" \
                          '. + [{slug:$s, target:$t, version:$v, os:$o}]' <<<"$include")
              done
            fi
          done < <(jq -c '.[]' <<<"$plugins")

          any=false
          [ "$(jq 'length' <<<"$changed")" -gt 0 ] && any=true
          echo "Changed: $changed  (any=$any)"

          {
            echo "tag=$tag"
            echo "prev_tag=${prev_tag:-}"
            echo "changed=$changed"
            echo "include=$include"
            echo "any_changed=$any"
            echo "plugins=$plugins"
          } >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------------------
  # Build only the changed plugins and zip each on its native OS (one matrix
  # entry per (plugin, OS)). The zip — not a loose binary — is the artifact, so
  # macOS bundle structure and permissions survive the artifact hop intact.
  # --------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.entry.slug }} (${{ matrix.entry.os }})
    needs: plan
    if: needs.plan.outputs.any_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJSON(needs.plan.outputs.include) }}
    runs-on: ${{ matrix.entry.os == 'macOS' && 'macos-latest' || 'windows-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja (macOS)
        if: matrix.entry.os == 'macOS'
        run: brew install ninja

      - name: Set up MSVC + Ninja (Windows)
        if: matrix.entry.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (Windows)
        if: matrix.entry.os == 'Windows'
        run: choco install ninja -y

      - name: Compiler cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: release-${{ matrix.entry.os }}
          variant: ${{ matrix.entry.os == 'macOS' && 'ccache' || 'sccache' }}
          max-size: 1500M

      - name: Configure
        shell: bash
        run: |
          if [ "${{ matrix.entry.os }}" = "macOS" ]; then L=ccache; else L=sccache; fi
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER="$L" -DCMAKE_CXX_COMPILER_LAUNCHER="$L"

      - name: Build
        shell: bash
        run: |
          targets="${{ matrix.entry.target }}_VST3"
          if [ "${{ matrix.entry.os }}" = "macOS" ]; then
            targets="$targets ${{ matrix.entry.target }}_AU"
          fi
          cmake --build build --target $targets

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p out
          find "build/plugins/${{ matrix.entry.slug }}" \
            \( -type d -path '*/VST3/*.vst3' -o -type d -path '*/AU/*.component' \) \
            -exec cp -R {} out/ \;
          ls -la out

      # macOS ships AU (.component) and VST3 (.vst3) as SEPARATE zips so a user
      # can grab just the format they need. Version in the filename uses
      # `v<major>_<minor>_<patch>` (dots would clash with the `-` field separator).
      - name: Zip plugin (macOS)
        if: matrix.entry.os == 'macOS'
        shell: bash
        env:
          SLUG: ${{ matrix.entry.slug }}
          VER: ${{ matrix.entry.version }}
        run: |
          mkdir -p pkg
          vus="v${VER//./_}"
          ( cd out && zip -r -y -q "$GITHUB_WORKSPACE/pkg/${SLUG}-${vus}-macOS-AU.zip"   *.component )
          ( cd out && zip -r -y -q "$GITHUB_WORKSPACE/pkg/${SLUG}-${vus}-macOS-VST3.zip" *.vst3 )

      - name: Zip plugin (Windows)
        if: matrix.entry.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force pkg | Out-Null
          $vus = "v" + ("${{ matrix.entry.version }}" -replace '\.','_')
          Compress-Archive -Path out/*.vst3 -DestinationPath "pkg/${{ matrix.entry.slug }}-$vus-Windows.zip" -Force

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.entry.os }}-${{ matrix.entry.slug }}
          path: pkg/*.zip
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Per OS, on the native runner: assemble the per-OS everything bundle from the
  # changed plugins' zips (this run) + the unchanged plugins' zips (verbatim from
  # the previous release). All unzip/rezip happens on the matching OS.
  # --------------------------------------------------------------------------
  package:
    name: Package ${{ matrix.os }}
    needs: [plan, build]
    if: always() && needs.plan.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        os: [macOS, Windows]
    runs-on: ${{ matrix.os == 'macOS' && 'macos-latest' || 'windows-latest' }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download rebuilt plugin zips
        if: needs.plan.outputs.any_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-${{ matrix.os }}-*
          path: built
          merge-multiple: true

      # Per-plugin AU/VST3 zips (rebuilt this run, or carried verbatim from the
      # previous release) are re-emitted as-is, and their contents are FLATTENED
      # into the everything bundle (bundles sit at the zip root, so a user can
      # unzip and drop the whole contents straight into one plugin folder).
      - name: Assemble bundle (macOS)
        if: matrix.os == 'macOS'
        shell: bash
        env:
          TAG: ${{ needs.plan.outputs.tag }}
          PREV_TAG: ${{ needs.plan.outputs.prev_tag }}
          PLUGINS: ${{ needs.plan.outputs.plugins }}
          CHANGED: ${{ needs.plan.outputs.changed }}
        run: |
          set -euo pipefail
          root="$PWD"
          mkdir -p dist prev stageAU stageVST3
          [ -n "$PREV_TAG" ] && gh release download "$PREV_TAG" -D prev || true
          is_changed() { jq -e --arg s "$1" 'index($s) != null' <<<"$CHANGED" >/dev/null; }
          tus="v${TAG//./_}"
          while read -r row; do
            slug=$(jq -r .slug <<<"$row"); ver=$(jq -r .version <<<"$row")
            vus="v${ver//./_}"
            for fmt in AU VST3; do
              zipname="${slug}-${vus}-macOS-${fmt}.zip"
              if is_changed "$slug"; then src="built/$zipname"; else src="prev/$zipname"; fi
              [ -f "$src" ] || { echo "::error::missing $zipname (changed=$(is_changed "$slug" && echo yes || echo no), prev=$PREV_TAG)"; exit 1; }
              cp "$src" "dist/$zipname"
            done
            ( cd stageAU   && unzip -q "$root/dist/${slug}-${vus}-macOS-AU.zip" )
            ( cd stageVST3 && unzip -q "$root/dist/${slug}-${vus}-macOS-VST3.zip" )
          done < <(jq -c '.[]' <<<"$PLUGINS")
          ( cd stageAU   && zip -r -y -q "$root/dist/tatsunari-plugins-${tus}-macOS-AU.zip" . )
          ( cd stageVST3 && zip -r -y -q "$root/dist/tatsunari-plugins-${tus}-macOS-VST3.zip" . )
          echo "----- dist (macOS) -----"; ls -la dist

      - name: Assemble bundle (Windows)
        if: matrix.os == 'Windows'
        shell: pwsh
        env:
          TAG: ${{ needs.plan.outputs.tag }}
          PREV_TAG: ${{ needs.plan.outputs.prev_tag }}
          PLUGINS: ${{ needs.plan.outputs.plugins }}
          CHANGED: ${{ needs.plan.outputs.changed }}
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force dist, prev, stageWin | Out-Null
          if ($env:PREV_TAG) { gh release download $env:PREV_TAG -D prev }
          $plugins = $env:PLUGINS | ConvertFrom-Json
          $changed = @($env:CHANGED | ConvertFrom-Json)
          $tus = "v" + ($env:TAG -replace '\.','_')
          foreach ($p in $plugins) {
            $vus = "v" + ($p.version -replace '\.','_')
            $zipname = "$($p.slug)-$vus-Windows.zip"
            if ($changed -contains $p.slug) { $src = "built/$zipname" } else { $src = "prev/$zipname" }
            if (-not (Test-Path $src)) { throw "missing $zipname (prev=$($env:PREV_TAG))" }
            Copy-Item $src "dist/$zipname"
            Expand-Archive "dist/$zipname" -DestinationPath stageWin -Force
          }
          Compress-Archive -Path "stageWin/*" -DestinationPath "dist/tatsunari-plugins-$tus-Windows.zip" -Force
          Get-ChildItem dist

      - name: Upload per-OS assets
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*.zip
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Publish the single Release: all per-OS assets + manifest.json + notes.
  # This job never touches binaries, only already-built zips and text.
  # --------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: [plan, package]
    if: always() && needs.plan.result == 'success' && needs.package.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download per-OS assets
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Build manifest
        shell: bash
        env:
          PLUGINS: ${{ needs.plan.outputs.plugins }}
        run: |
          # manifest.json — slug -> version for every plugin (drives next run's
          # change detection and carry-over).
          jq -c 'map({(.slug): .version}) | add' <<<"$PLUGINS" > dist/manifest.json
          cat dist/manifest.json

      # Release notes: one entry per CHANGED plugin listing its commits since the
      # previous release, grouped by conventional-commit prefix (feat -> fix ->
      # other -> none) and oldest-first within a group. Plus a download table.
      - name: Build release notes
        shell: bash
        env:
          TAG: ${{ needs.plan.outputs.tag }}
          PREV_TAG: ${{ needs.plan.outputs.prev_tag }}
          PLUGINS: ${{ needs.plan.outputs.plugins }}
          CHANGED: ${{ needs.plan.outputs.changed }}
        run: |
          python3 - <<'PY'
          import json, os, re, subprocess
          tag = os.environ['TAG']; prev = os.environ['PREV_TAG']
          plugins = json.loads(os.environ['PLUGINS'])
          changed = set(json.loads(os.environ['CHANGED']))
          base = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/releases/download/{tag}"

          RECOG = {"feat","fix","docs","refactor","perf","test","chore","ci","build","style","revert"}
          pat = re.compile(r'^([a-zA-Z]+)(\([^)]*\))?!?:')
          def rank(s):
              m = pat.match(s)
              if m and m.group(1).lower() in RECOG:
                  t = m.group(1).lower()
                  return 0 if t == "feat" else 1 if t == "fix" else 2
              return 3
          def vus(v):
              return "v" + v.replace(".", "_")
          def commits(slug):
              rng = (prev + "..HEAD") if prev else "HEAD"
              out = subprocess.check_output(
                  ["git","log","--no-merges","--pretty=%s",rng,"--",f"plugins/{slug}/"], text=True)
              cs = [l for l in out.splitlines() if l.strip()][::-1]   # oldest-first
              return sorted(cs, key=rank)                            # stable within a group

          L = [f"## リリース {tag}",
               ("_初回リリース_" if not prev else f"_{prev} からの変更_"),
               "", "### リリースノート"]
          any_notes = False
          for p in plugins:
              if p['slug'] in changed:
                  any_notes = True
                  L.append(f"- **{p['name']} v{p['version']}**")
                  for c in commits(p['slug']):
                      L.append(f"  - {c}")
          if not any_notes:
              L.append("- 変更されたプラグインはありません（再パッケージのみ）。")

          tus = vus(tag)
          L += ["", "### ダウンロード", "",
                "| プラグイン | macOS (AU) | macOS (VST3) | Windows (VST3) |",
                "|---|---|---|---|",
                f"| **All Plugins ({len(plugins)})** | [AU]({base}/tatsunari-plugins-{tus}-macOS-AU.zip) | [VST3]({base}/tatsunari-plugins-{tus}-macOS-VST3.zip) | [VST3]({base}/tatsunari-plugins-{tus}-Windows.zip) |"]
          for p in plugins:
              fv = vus(p['version'])
              L.append(f"| {p['name']} v{p['version']} | [AU]({base}/{p['slug']}-{fv}-macOS-AU.zip) | [VST3]({base}/{p['slug']}-{fv}-macOS-VST3.zip) | [VST3]({base}/{p['slug']}-{fv}-Windows.zip) |")

          with open("notes.md", "w") as f:
              f.write("\n".join(L) + "\n")
          print(open("notes.md").read())
          PY

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.tag }}
          name: ${{ needs.plan.outputs.tag }}
          files: |
            dist/*.zip
            dist/manifest.json
          draft: false
          body_path: notes.md
