name: CI

# The gate (per CLAUDE.md): builds on the matrix, CTest passes, and pluginval
# strictness 5 (headless) passes for every built format — VST3 on every OS, AU
# on macOS.
#
# Builds use the Ninja generator + a compiler cache (ccache, or sccache for
# MSVC) persisted across runs, so unchanged JUCE modules are not recompiled.
# build/_deps is cached separately so the JUCE clone + juceaide helper build
# (both happen at configure time, outside the compiler cache) are skipped too.

# Path-scoped: this gate only builds/tests/validates the plugins, so it runs only
# when a build-affecting source changes. core/ ui/ presets/ params/ cmake/ and the
# root CMakeLists.txt are included (not just plugins/**) because a change there affects
# every plugin — CLAUDE.md requires the full suite to run for any core/ change.
# Installer- or docs-only PRs skip it. main is unprotected, so a skipped run does
# not block merges. Keep the two `paths` lists identical (push == pull_request).
#
# Within a triggered PR run, the "Select plugins to build" step narrows the
# build further: plugin-only PRs configure (and test/validate) just the touched
# plugins via -DFACTORY_PLUGINS; shared-code changes still build everything.
on:
  push:
    branches: [ main ]
    paths:
      - 'plugins/**'
      - 'core/**'
      - 'ui/**'
      - 'presets/**'
      - 'params/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'plugins/**'
      - 'core/**'
      - 'ui/**'
      - 'presets/**'
      - 'params/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PLUGINVAL_STRICTNESS: "5"

jobs:
  build-test-validate:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: macOS,   os: macos-latest,   ccache: ccache }
          - { name: Windows, os: windows-latest, ccache: sccache }

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Set up MSVC + Ninja (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Compiler cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}
          variant: ${{ matrix.ccache }}
          max-size: 1500M

      # FetchContent clones JUCE and builds the juceaide helper during
      # configure — neither is covered by the compiler cache. Caching
      # build/_deps (sources + subbuild stamps + juceaide build tree) turns
      # both into no-ops. Keyed on the root CMakeLists.txt, which carries the
      # JUCE version pin, so bumping JUCE invalidates it automatically.
      - name: Cache JUCE (FetchContent deps)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-deps-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}

      # Decide which plugins can have changed binaries. Shared code (core/ ui/
      # presets/ params/ cmake/ the root CMakeLists.txt, this workflow) affects every plugin ->
      # build everything. Otherwise only the plugins the PR touches can change,
      # so configure just those — their test exes and pluginval bundles follow
      # automatically. push-to-main and workflow_dispatch always build all, so
      # main stays fully verified and its caches stay warm. Keep the shared-code
      # regex in sync with the `paths` trigger lists above.
      - name: Select plugins to build
        id: select
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          scope=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --quiet --depth=1 origin "$BASE_SHA"
            changed=$(git diff --name-only "$BASE_SHA" HEAD)
            if ! echo "$changed" | grep -qE '^(core/|ui/|presets/|params/|cmake/|CMakeLists\.txt$|\.github/workflows/ci\.yml$)'; then
              # Keep only slugs that still exist (a deleted plugin has nothing
              # to build; if the PR is deletion-only, fall back to build-all).
              for s in $(echo "$changed" | grep -E '^plugins/[^/]+/' | cut -d/ -f2 | sort -u); do
                [ -d "plugins/$s" ] && scope="${scope:+$scope,}$s"
              done
            fi
          fi
          echo "plugins=$scope" >> "$GITHUB_OUTPUT"
          if [ -n "$scope" ]; then echo "Building subset: $scope"; else echo "Building all plugins"; fi

      - name: Configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER_LAUNCHER=${{ matrix.ccache }}
          -DCMAKE_CXX_COMPILER_LAUNCHER=${{ matrix.ccache }}
          -DFACTORY_PLUGINS="${{ steps.select.outputs.plugins }}"

      # Ninja self-limits to the core count, so peak memory stays in check.
      - name: Build
        run: cmake --build build

      # Test cases (one exe run per plugin × sample rate) are independent
      # headless processes — run them in parallel across the runner's cores.
      # --no-tests=error: every configured plugin registers tests, so an empty
      # test set means the plugin selection went wrong — fail loudly instead of
      # letting the gate pass on a build that contains nothing.
      - name: Unit tests (CTest)
        run: ctest --test-dir build --output-on-failure --parallel 4 --no-tests=error

      # ---- pluginval ----------------------------------------------------------
      - name: Validate plugins (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          curl -sL https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip -o pluginval.zip
          unzip -o pluginval.zip
          xattr -cr pluginval.app || true
          PV="pluginval.app/Contents/MacOS/pluginval"
          mkdir -p "$HOME/Library/Audio/Plug-Ins/Components"
          while IFS= read -r c; do
            cp -R "$c" "$HOME/Library/Audio/Plug-Ins/Components/"
          done < <(find build -type d -path '*/AU/*.component')
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          status=0
          while IFS= read -r p; do
            echo "::group::pluginval $p"
            "$PV" --strictness-level "$PLUGINVAL_STRICTNESS" --skip-gui-tests --validate-in-process --validate "$p" || status=1
            echo "::endgroup::"
          done < <(find build \( -type d -path '*/VST3/*.vst3' -o -type d -path '*/AU/*.component' \))
          [ "$status" -eq 0 ]

      - name: Validate plugins (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip -OutFile pluginval.zip
          Expand-Archive pluginval.zip -DestinationPath pv -Force
          $pv = (Get-ChildItem pv -Recurse -Filter pluginval.exe | Select-Object -First 1).FullName
          $bundles = Get-ChildItem build -Recurse -Directory -Filter *.vst3 |
                     Where-Object { $_.FullName -match '[\\/]VST3[\\/]' }
          $status = 0
          foreach ($b in $bundles) {
            Write-Host "::group::pluginval $($b.FullName)"
            $args = "--strictness-level $env:PLUGINVAL_STRICTNESS --skip-gui-tests --validate-in-process --validate `"$($b.FullName)`""
            $proc = Start-Process -FilePath $pv -ArgumentList $args -NoNewWindow -Wait -PassThru
            if ($proc.ExitCode -ne 0) { $status = 1 }
            Write-Host "::endgroup::"
          }
          if ($status -ne 0) { exit 1 }
