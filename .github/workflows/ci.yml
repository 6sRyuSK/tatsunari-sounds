name: CI

# The gate (per CLAUDE.md): builds on the matrix, CTest passes, and pluginval
# strictness 5 (headless) passes for every built format — VST3 on every OS, AU
# on macOS.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PLUGINVAL_STRICTNESS: "5"

jobs:
  build-test-validate:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Linux,   os: ubuntu-latest }
          - { name: macOS,   os: macos-latest }
          - { name: Windows, os: windows-latest }

    steps:
      - uses: actions/checkout@v4

      # JUCE on Linux needs ALSA/X11/freetype dev headers; xvfb gives the
      # headless validate step a virtual display.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev \
            libfreetype6-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libglu1-mesa-dev mesa-common-dev xvfb

      # Uniform across single-config (Make) and multi-config (VS) generators:
      # pass both CMAKE_BUILD_TYPE and --config; the irrelevant one is ignored.
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      # Bounded parallelism: with the Makefile generator `--parallel` (no number)
      # means `make -j` with no limit, which compiles every plugin's full set of
      # JUCE modules at once and exhausts runner memory (OOM, exit 143) as the
      # plugin count grows. Cap to the core count to keep peak memory in check.
      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Unit tests (CTest)
        run: ctest --test-dir build -C Release --output-on-failure

      # ---- pluginval ----------------------------------------------------------
      - name: Validate plugins (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -sL https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip -o pluginval.zip
          unzip -o pluginval.zip
          chmod +x pluginval
          status=0
          while IFS= read -r p; do
            echo "::group::pluginval $p"
            xvfb-run -a ./pluginval --strictness-level "$PLUGINVAL_STRICTNESS" --skip-gui-tests --validate-in-process --validate "$p" || status=1
            echo "::endgroup::"
          done < <(find build -type d -path '*/VST3/*.vst3')
          [ "$status" -eq 0 ]

      - name: Validate plugins (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          curl -sL https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip -o pluginval.zip
          unzip -o pluginval.zip
          xattr -cr pluginval.app || true
          PV="pluginval.app/Contents/MacOS/pluginval"
          # AU plugins must live in a registered location to load.
          mkdir -p "$HOME/Library/Audio/Plug-Ins/Components"
          while IFS= read -r c; do
            cp -R "$c" "$HOME/Library/Audio/Plug-Ins/Components/"
          done < <(find build -type d -path '*/AU/*.component')
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          status=0
          while IFS= read -r p; do
            echo "::group::pluginval $p"
            "$PV" --strictness-level "$PLUGINVAL_STRICTNESS" --skip-gui-tests --validate-in-process --validate "$p" || status=1
            echo "::endgroup::"
          done < <(find build \( -type d -path '*/VST3/*.vst3' -o -type d -path '*/AU/*.component' \))
          [ "$status" -eq 0 ]

      # pluginval.exe is a GUI-subsystem binary; Start-Process -Wait -PassThru
      # is the reliable way to wait for it and read its exit code.
      - name: Validate plugins (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip -OutFile pluginval.zip
          Expand-Archive pluginval.zip -DestinationPath pv -Force
          $pv = (Get-ChildItem pv -Recurse -Filter pluginval.exe | Select-Object -First 1).FullName
          $bundles = Get-ChildItem build -Recurse -Directory -Filter *.vst3 |
                     Where-Object { $_.FullName -match '[\\/]VST3[\\/]' }
          $status = 0
          foreach ($b in $bundles) {
            Write-Host "::group::pluginval $($b.FullName)"
            $args = "--strictness-level $env:PLUGINVAL_STRICTNESS --skip-gui-tests --validate-in-process --validate `"$($b.FullName)`""
            $proc = Start-Process -FilePath $pv -ArgumentList $args -NoNewWindow -Wait -PassThru
            if ($proc.ExitCode -ne 0) { $status = 1 }
            Write-Host "::endgroup::"
          }
          if ($status -ne 0) { exit 1 }
