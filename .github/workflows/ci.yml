name: CI

# The gate (per CLAUDE.md): builds on the matrix, CTest passes, and pluginval
# strictness 5 (headless) passes for every built format — VST3 on every OS, AU
# on macOS.
#
# Builds use the Ninja generator + a compiler cache (ccache, or sccache for
# MSVC) persisted across runs, so unchanged JUCE modules are not recompiled.

# Path-scoped: this gate only builds/tests/validates the plugins, so it runs only
# when a build-affecting source changes. core/ ui/ cmake/ and the root
# CMakeLists.txt are included (not just plugins/**) because a change there affects
# every plugin — CLAUDE.md requires the full suite to run for any core/ change.
# Installer- or docs-only PRs skip it. main is unprotected, so a skipped run does
# not block merges. Keep the two `paths` lists identical (push == pull_request).
on:
  push:
    branches: [ main ]
    paths:
      - 'plugins/**'
      - 'core/**'
      - 'ui/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'plugins/**'
      - 'core/**'
      - 'ui/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PLUGINVAL_STRICTNESS: "5"

jobs:
  build-test-validate:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: macOS,   os: macos-latest,   ccache: ccache }
          - { name: Windows, os: windows-latest, ccache: sccache }

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Set up MSVC + Ninja (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Compiler cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}
          variant: ${{ matrix.ccache }}
          max-size: 1500M

      - name: Configure
        run: >
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER_LAUNCHER=${{ matrix.ccache }}
          -DCMAKE_CXX_COMPILER_LAUNCHER=${{ matrix.ccache }}

      # Ninja self-limits to the core count, so peak memory stays in check.
      - name: Build
        run: cmake --build build

      - name: Unit tests (CTest)
        run: ctest --test-dir build --output-on-failure

      # ---- pluginval ----------------------------------------------------------
      - name: Validate plugins (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          curl -sL https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip -o pluginval.zip
          unzip -o pluginval.zip
          xattr -cr pluginval.app || true
          PV="pluginval.app/Contents/MacOS/pluginval"
          mkdir -p "$HOME/Library/Audio/Plug-Ins/Components"
          while IFS= read -r c; do
            cp -R "$c" "$HOME/Library/Audio/Plug-Ins/Components/"
          done < <(find build -type d -path '*/AU/*.component')
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          status=0
          while IFS= read -r p; do
            echo "::group::pluginval $p"
            "$PV" --strictness-level "$PLUGINVAL_STRICTNESS" --skip-gui-tests --validate-in-process --validate "$p" || status=1
            echo "::endgroup::"
          done < <(find build \( -type d -path '*/VST3/*.vst3' -o -type d -path '*/AU/*.component' \))
          [ "$status" -eq 0 ]

      - name: Validate plugins (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip -OutFile pluginval.zip
          Expand-Archive pluginval.zip -DestinationPath pv -Force
          $pv = (Get-ChildItem pv -Recurse -Filter pluginval.exe | Select-Object -First 1).FullName
          $bundles = Get-ChildItem build -Recurse -Directory -Filter *.vst3 |
                     Where-Object { $_.FullName -match '[\\/]VST3[\\/]' }
          $status = 0
          foreach ($b in $bundles) {
            Write-Host "::group::pluginval $($b.FullName)"
            $args = "--strictness-level $env:PLUGINVAL_STRICTNESS --skip-gui-tests --validate-in-process --validate `"$($b.FullName)`""
            $proc = Start-Process -FilePath $pv -ArgumentList $args -NoNewWindow -Wait -PassThru
            if ($proc.ExitCode -ne 0) { $status = 1 }
            Write-Host "::endgroup::"
          }
          if ($status -ne 0) { exit 1 }
