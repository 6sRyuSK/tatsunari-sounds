# Builds the cross-platform TUI installer and attaches its binaries + catalog.json
# to a release. It never touches the protected release workflow or manifest.json.
#
# Trigger: release.yml publishes the GitHub Release using the repo GITHUB_TOKEN,
# and GitHub deliberately does NOT emit a `release: published` event for a
# token-created release (recursive-run prevention). So listening on `release`
# never fires — this workflow used to have to be dispatched by hand after every
# release. Instead we chain off the Release workflow *completing* via
# `workflow_run`, which is not subject to that suppression, so the installer
# assets are attached automatically. `workflow_dispatch` stays for manual
# re-runs / back-fills (pass the tag explicitly).
name: installer

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach installer assets to (e.g. 2026.2)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # types: [completed] also fires on failure/cancellation — only proceed when
    # the Release run actually succeeded. (workflow_dispatch has no such field.)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/installer/go.mod
          cache-dependency-path: tools/installer/go.sum

      - name: Resolve tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            # workflow_run: release.yml just published the newest release.
            tag="$(gh release view --json tagName --jq .tagName)"
          fi
          if [ -z "$tag" ]; then
            echo "::error::could not resolve a release tag"; exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $tag"

      - name: Build installer binaries
        working-directory: tools/installer
        env:
          CGO_ENABLED: "0"
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p dist
          ldflags="-s -w -X main.version=${TAG}"
          build() { GOOS="$1" GOARCH="$2" go build -trimpath -ldflags "$ldflags" -o "dist/$3" . ; }
          # darwin/arm64 is ad-hoc signed by Go's internal linker, so it runs
          # unsigned on Apple Silicon without being SIGKILLed.
          build darwin  amd64 tatsunari-darwin-amd64
          build darwin  arm64 tatsunari-darwin-arm64
          build windows amd64 tatsunari-windows-amd64.exe
          ls -l dist

      - name: Generate catalog.json
        run: python3 tools/gen_catalog.py --emit-json tools/installer/dist/catalog.json

      - name: Attach assets to the release
        working-directory: tools/installer/dist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "$TAG" \
            tatsunari-darwin-amd64 \
            tatsunari-darwin-arm64 \
            tatsunari-windows-amd64.exe \
            catalog.json \
            --clobber
